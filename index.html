<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS:GO 2017 Hub</title>
    <style>
        /* Basic reset and dark background setup */
        body {
            background-color: #0d0d0d;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        /* Container is BIG (wide layout) */
        .container {
            width: 100%;
            max-width: 1100px;
            background: linear-gradient(to bottom, #1f1416, #120c0d);
            border: 1px solid #2d1b1e;
            border-radius: 8px;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        /* Top thin green text bar */
        .top-bar {
            background-color: #0b0506;
            padding: 5px 15px;
            font-size: 12px;
            color: #39b54a;
        }

        /* Header section with the yellow title */
        .header {
            text-align: center;
            padding: 25px 10px;
            background: radial-gradient(circle, #2d1e21 0%, #170f10 100%);
        }

        .header h1 {
            color: #ffff00;
            font-family: 'Georgia', serif;
            font-style: italic;
            font-size: 32px;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        /* BIGGER RED DISPLAY AREA */
        .game-display {
            padding: 120px 40px; 
            min-height: 250px;   
            background-color: rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: flex-start; 
            align-items: flex-start;
        }

        /* Style for the link - Text is SMALL, underline is removed */
        .game-link {
            font-size: 16px; 
            color: #e0e0e0;
            text-decoration: none; /* Removes the default blue underline */
            transition: color 0.2s ease;
            width: fit-content;
        }

        /* Hover effect makes it turn yellow when cursor is over it */
        .game-link:hover {
            color: #ffff00;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Top Green Link Bar -->
        <div class="top-bar">
            steamno-crew.com
        </div>

        <!-- Main Title Header -->
        <div class="header">
            <h1>www.steamno-crew.com</h1>
        </div>

        <!-- Big Red/Dark Game Display Area -->
        <div class="game-display">
            <!-- Your Clickable Link -->
            <a href="https://yazancsgocracker.github.io/yazancsgocracker-csgo-2017-mp.github.io/" class="game-link">
                Counter-Strike: Global Offensive 2017 MP Online
            </a>
        </div>
    </div>

</body>
</html>
