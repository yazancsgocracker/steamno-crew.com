<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>steamno-crew.com</title>
    <style>
        /* Base setup matching your preview image background color */
        body {
            background-color: #0b0707; /* Super deep dark brown-black background */
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        /* Top Header Area Box */
        .header-section {
            background-color: #190f0f; /* Slightly lighter reddish-black gradient box */
            text-align: center;
            padding: 40px 20px;
            border-bottom: 1px solid #231515;
        }

        /* Your skull avatar locked perfectly at 64x64px */
        .header-logo {
            width: 64px;
            height: 64px;
            object-fit: contain;
            display: block;
            margin: 0 auto 15px auto;
        }

        /* Exact bright yellow italic website lettering font styling */
        .website-title {
            color: #e6e600;
            font-family: "Georgia", serif;
            font-style: italic;
            font-weight: bold;
            font-size: 36px;
            margin: 0;
            letter-spacing: 0.5px;
        }

        /* Left side container alignment for game list paths */
        .menu-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 50px 40px;
        }

        /* Styling for the game download links and interactive items */
        .menu-item {
            font-size: 17px;
            margin-bottom: 25px;
            user-select: none;
        }

        /* Standard link style for direct game downloads */
        .menu-item a {
            color: #d1c7c7;
            text-decoration: none;
            display: inline-block;
            transition: color 0.2s;
        }

        .menu-item a:hover {
            color: #ffffff;
            text-decoration: underline;
        }

        /* Text trigger style for the dropdown */
        .dropdown-trigger {
            color: #d1c7c7;
            cursor: pointer;
            display: inline-block;
            transition: color 0.2s;
        }

        .dropdown-trigger:hover {
            color: #ffffff;
        }

        /* Nested sub-version layout list for dropdown files */
        .sub-version-list {
            display: none;
            list-style-type: none;
            padding-left: 20px;
            margin-top: 10px;
            margin-bottom: 20px;
        }

        .sub-version-list li {
            margin: 12px 0;
        }

        .sub-version-list a {
            color: #ff4444; /* Stand-out color for cracked game versions links */
            text-decoration: none;
            font-size: 16px;
        }

        .sub-version-list a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <!-- Top Banner Element Header Box -->
    <div class="header-section">
        <img class="header-logo" src="https://i.postimg.cc/tJSfdzQ9/avatar.png" alt="STEAMNO LOGO">
        <h1 class="website-title">www.steamno-crew.com</h1>
    </div>

    <!-- Interactive Navigation Elements List -->
    <div class="menu-container">
        
        <!-- Added: 2013 CSGO Link -->
        <div class="menu-item">
            <a href="https://bzzhr.co/ljbrffa0jd8q" target="_blank">Counter-Strike: Global Offensive 2013</a>
        </div>

        <!-- 2017 CSGO Link -->
        <div class="menu-item">
            <a href="https://yazancsgocracker.github.io/yazancsgocracker-csgo-2017-mp.github.io/" target="_blank">Counter-Strike: Global Offensive 2017 MP Online</a>
        </div>
        
        <!-- Clickable Trigger Text for the Expandable Sub-Menu -->
        <div class="menu-item">
            <span class="dropdown-trigger" onclick="toggleCSSMenu()">Counter-Strike Source</span>
            
            <!-- The version links that roll open natively upon clicking -->
            <ul id="cssDropdown" class="sub-version-list">
                <li><a href="https://ts.bzzhr.co/d/4mnzi60hyg30"target="_blank">- CSS Cracked v93</a></li>
            </ul>
        </div>
        
    </div>

    <!-- Core Script handling the toggle visibility mechanics -->
    <script>
        function toggleCSSMenu() {
            var list = document.getElementById("cssDropdown");
            if (list.style.display === "block") {
                list.style.display = "none";
            } else {
                list.style.display = "block";
            }
        }
    </script>

</body>
</html>
