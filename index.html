<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS:GO Hub</title>
    <style>
        body {
            background-color: #0d0d0d;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            background: linear-gradient(to bottom, #1f1416, #120c0d);
            border: 1px solid #2d1b1e;
            border-radius: 8px;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .top-bar {
            background-color: #0b0506;
            padding: 5px 15px;
            font-size: 12px;
            color: #39b54a;
        }

        .header {
            text-align: center;
            padding: 25px 10px;
            background: radial-gradient(circle, #2d1e21 0%, #170f10 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .logo-img {
            width: 150px; 
            height: auto;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.5); 
        }

        .header h1 {
            color: #ffff00;
            font-family: 'Georgia', serif;
            font-style: italic;
            font-size: 32px;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        }

        .game-display {
            padding: 80px 40px; 
            min-height: 250px;   
            background-color: rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            justify-content: flex-start; 
            align-items: flex-start;
            gap: 20px; 
        }

        .game-link {
            font-size: 16px; 
            color: #e0e0e0;
            text-decoration: none;
            transition: color 0.2s ease;
            width: fit-content;
        }

        .game-link:hover {
            color: #ffff00;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="top-bar">
            steamno-crew.com
        </div>

        <div class="header">
            <img src="https://i.ibb.co/v4bYVst/ok.jpg" alt="Steamno-Crew Logo" class="logo-img">
            <h1>www.steamno-crew.com</h1>
        </div>

        <div class="game-display">
            <a href="https://yazancsgocracker.github.io/yazancsgocracker-csgo-2017-mp.github.io/" class="game-link">
                Counter-Strike: Global Offensive 2017 MP Online
            </a>

            <a href="https://drive.google.com/file/d/1aUmvk4BzzTlDR2lhfFP7bjx0AWkYhVww/view?usp=sharing" class="game-link">
                Counter-Strike: Global Offensive 2016 MP SP
            </a>
        </div>
    </div>

</body>
</html>
